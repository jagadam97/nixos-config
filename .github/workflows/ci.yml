name: Build NixOS Configurations

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: jagadam97
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build nauvoo configuration
        run: nix build .#nixosConfigurations.nauvoo.config.system.build.toplevel

      # Add more hosts here as you create them:
      # - name: Build laptop configuration
      #   run: nix build .#nixosConfigurations.laptop.config.system.build.toplevel
      #
      # - name: Build server configuration
      #   run: nix build .#nixosConfigurations.server.config.system.build.toplevel